services:
  # ============================================================
  # Infrastructure
  # ============================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aicommerce}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/$${S3_BUCKET:-ai-commerce-os} --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-ai-commerce-os}

  # ============================================================
  # DB Migrations (one-off)
  # ============================================================
  migrate:
    build:
      context: .
      dockerfile: infra/docker/api-node.Dockerfile
    command: ["node", "infra/migrations/run.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-aicommerce}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ============================================================
  # Application Services
  # ============================================================
  api-node:
    build:
      context: .
      dockerfile: infra/docker/api-node.Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-aicommerce}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-minimum-32-characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-ai-commerce-os}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: "true"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      DRY_RUN: ${DRY_RUN:-true}
      ENABLE_RLS: ${ENABLE_RLS:-false}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_SHOP_DOMAIN:-}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN:-}
      SHOPIFY_CLIENT_ID: ${SHOPIFY_CLIENT_ID:-}
      SHOPIFY_CLIENT_SECRET: ${SHOPIFY_CLIENT_SECRET:-}
      SHOPIFY_API_VERSION: ${SHOPIFY_API_VERSION:-2024-10}
      TRACKING_ENABLED: ${TRACKING_ENABLED:-false}
      STORE_URL: ${STORE_URL:-}
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_API_VERSION: ${META_API_VERSION:-v21.0}
      META_TEST_EVENT_CODE: ${META_TEST_EVENT_CODE:-}
      TIKTOK_PIXEL_ID: ${TIKTOK_PIXEL_ID:-}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
      TIKTOK_TEST_EVENT_CODE: ${TIKTOK_TEST_EVENT_CODE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./packages:/app/packages
      - ./services/api-node:/app/services/api-node
      - /app/node_modules
      - /app/services/api-node/node_modules

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-aicommerce}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-ai-commerce-os}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      DRY_RUN: ${DRY_RUN:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./packages:/app/packages
      - ./services/workers:/app/services/workers
      - /app/node_modules
      - /app/services/workers/node_modules

  agent-service:
    build:
      context: .
      dockerfile: infra/docker/agent-service.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-aicommerce}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: debug
      DRY_RUN: ${DRY_RUN:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/agent-service:/app

  dashboard-next:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-nextauth-secret-minimum-32-chars}
      NEXTAUTH_URL: http://localhost:3000
      API_URL: http://api-node:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      api-node:
        condition: service_healthy
    volumes:
      - ./packages/shared:/app/packages/shared
      - ./apps/dashboard-next:/app/apps/dashboard-next
      - /app/node_modules
      - /app/apps/dashboard-next/node_modules
      - /app/apps/dashboard-next/.next

  # ============================================================
  # Optional: Observability
  # ============================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "8888:8888"   # Prometheus metrics
    profiles:
      - observability

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    profiles:
      - observability

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    profiles:
      - observability

  # ============================================================
  # Optional: pgAdmin
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aicommerce.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    profiles:
      - tools

volumes:
  pgdata:
  redisdata:
  miniodata:
